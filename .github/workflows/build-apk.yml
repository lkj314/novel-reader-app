name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Bundle JavaScript
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build Release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk xiaoswz-reader.apk
          ls -lh xiaoswz-reader.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          name: 小书屋阅读器 v1.0.0
          body: |
            ## 小书屋阅读器

            基于 React Native WebView 的 Android 阅读器 APP。

            ### 功能
            - 📱 WebView 封装小书屋网站
            - 🌙 沉浸式阅读体验
            - 📖 内置书源配置

            ### 下载
            下载 `xiaoswz-reader.apk` 安装即可使用（Release 版本，独立运行）
          files: xiaoswz-reader.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
